# Worker node for agent sandboxes (Phase 3b).
# See docs/design/36-docker-agents-vps-architecture.md

include:
  - docker-compose.vector.yml

services:
  chrome:
    image: chromedp/headless-shell:latest
    shm_size: 256m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  gvisor-check:
    image: docker:27-cli
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Checking gVisor (runsc) runtime..."
        if ! docker info --format '{{.Runtimes}}' | grep -q runsc; then
          echo "ERROR: runsc runtime not registered with Docker."
          echo "Install gVisor: https://gvisor.dev/docs/user_guide/install/"
          exit 1
        fi
        echo "Cgroup driver: $(docker info --format '{{.CgroupDriver}}')"
        echo "Cgroup version: $(docker info --format '{{.CgroupVersion}}')"
        docker run --rm --runtime=runsc busybox:latest echo "gVisor basic: OK"
        docker run --rm --runtime=runsc --pids-limit 64 busybox:latest echo "gVisor pids-limit: OK"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"

  worker:
    image: ghcr.io/assembledhq/143-server:${IMAGE_TAG:-latest}
    depends_on:
      chrome:
        condition: service_started
      gvisor-check:
        condition: service_completed_successfully
    # NODE_ID, WORKER_PRIVATE_IP, and PREVIEW_INTERNAL_BASE_URL are per-host
    # identity. They live in /opt/143/.env.local and are concatenated into
    # /opt/143/.env by provision.sh / deploy.sh so docker compose can
    # interpolate them below. The :? syntax fails the deploy loudly if any
    # value is missing — without it, port 8080 would bind to 0.0.0.0 (exposes
    # the internal preview API publicly) and the node would heartbeat without
    # a preview_internal_base_url (StartPreview returns PREVIEW_NO_WORKERS).
    # If any error below fires, run: make provision-worker HOST=<this-host>
    environment:
      DATABASE_URL: postgres://onefortythree:${DB_PASSWORD}@${DB_HOST}:5432/onefortythree?sslmode=disable
      ENV: production
      MODE: worker
      CHROME_WS_URL: ${CHROME_WS_URL:-ws://chrome:9222}
      MAX_CONCURRENT_RUNS: ${MAX_CONCURRENT_RUNS:-5}
      NODE_ID: ${NODE_ID:?missing in /opt/143/.env.local}
      PREVIEW_INTERNAL_BASE_URL: ${PREVIEW_INTERNAL_BASE_URL:?missing in /opt/143/.env.local}
      PREVIEW_ORIGIN_TEMPLATE: ${PREVIEW_ORIGIN_TEMPLATE:-https://{id}.preview.143.dev}
      SANDBOX_IMAGE: ghcr.io/assembledhq/143-sandbox:${IMAGE_TAG:-latest}
      SANDBOX_RUNTIME: runsc
      SANDBOX_REQUIRE_GVISOR: "true"
      # Bind-mounted into every sandbox at /etc/resolv.conf. The path here is
      # the *host* path because docker.sock resolves bind sources against the
      # host, not this worker container. Provisioned by provision.sh.
      SANDBOX_RESOLV_CONF: /etc/143/sandbox-resolv.conf
    env_file:
      - .env
    # App nodes reach this worker at http://${WORKER_PRIVATE_IP}:8080 over the
    # private fleet network to drive preview start/stop and proxy browser
    # HTTP/WebSocket traffic. Binding to the private IP (not 0.0.0.0) keeps
    # the internal API off the public interface — many providers already
    # expose 8080 on the public IP for monitoring.
    ports:
      - "${WORKER_PRIVATE_IP:?missing in /opt/143/.env.local}:8080:8080"
    group_add:
      - ${DOCKER_GID:-988}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Per-session GitHub credential sockets. Bind-mounted into this
      # container so the orchestrator (running as appuser uid 1000) can
      # create per-session unix sockets here, AND so the host docker
      # daemon — which resolves bind sources against the host filesystem
      # when wiring those sockets into sandbox containers — sees the same
      # path. The host directory is provisioned 0750 and owned 1000:1000
      # via systemd-tmpfiles in deploy/scripts/provision.sh.
      - /var/run/143/sandbox-auth:/var/run/143/sandbox-auth
      # Provisioning must stage this file before the first `docker compose up`.
      # If the bind source is missing, Docker creates a directory at the host
      # path and later deploy-time scp of the encrypted env file fails.
      - .env.production.enc:/.env.production.enc:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Must be ≥ in-process WORKER_DRAIN_TIMEOUT (internal/config/config.go,
    # default 45m) so Docker doesn't SIGKILL the process while it's still
    # draining in-flight coding turns. This is the binding outer cap — both
    # the rolling-deploy path's `--force-recreate` and any plain `docker
    # stop` / `docker compose restart` go through stop_grace_period.
    # deploy/scripts/deploy.sh's WORKER_DRAIN_TIMEOUT (default 7200s) is a
    # polling ceiling for the SIGTERM-then-wait loop, not a separate drain
    # budget — once we recreate, this 50m is what holds.
    stop_grace_period: 50m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
