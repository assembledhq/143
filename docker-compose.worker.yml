# Worker node for agent sandboxes (Phase 3b).
# See docs/design/36-docker-agents-vps-architecture.md

include:
  - docker-compose.vector.yml
  - docker-compose.dns-probe.yml

services:
  chrome:
    image: chromedp/headless-shell:latest
    shm_size: 256m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  gvisor-check:
    image: docker:27-cli
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Checking gVisor (runsc) runtime..."
        if ! docker info --format '{{.Runtimes}}' | grep -q runsc; then
          echo "ERROR: runsc runtime not registered with Docker."
          echo "Install gVisor: https://gvisor.dev/docs/user_guide/install/"
          exit 1
        fi
        echo "Cgroup driver: $(docker info --format '{{.CgroupDriver}}')"
        echo "Cgroup version: $(docker info --format '{{.CgroupVersion}}')"
        HEALTHCHECK_IMAGE="${SANDBOX_HEALTH_CHECK_IMAGE:-busybox:1.36.1}"
        docker image inspect "$$HEALTHCHECK_IMAGE" >/dev/null 2>&1 || docker pull "$$HEALTHCHECK_IMAGE"
        docker run --rm --runtime=runsc "$$HEALTHCHECK_IMAGE" echo "gVisor basic: OK"
        docker run --rm --runtime=runsc --pids-limit 64 "$$HEALTHCHECK_IMAGE" echo "gVisor pids-limit: OK"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"

  # DNS resolver for sandbox containers. Sandboxes bind-mount their
  # /etc/resolv.conf to point at this container's static IP on the
  # 143-sandbox bridge (172.30.0.2), which forwards to Docker's embedded
  # resolver at 127.0.0.11 — the only place preview-infra container names
  # (preview-db-<handle>, etc.) are registered. See Dockerfile.dnsmasq for
  # the rationale. Built locally on each worker; the build context is just
  # the Dockerfile, so no source tree on the host is required.
  sandbox-dns:
    build:
      context: .
      dockerfile: Dockerfile.dnsmasq
    image: 143-sandbox-dns:local
    networks:
      sandbox:
        # Static IP so /etc/143/sandbox-resolv.conf can hard-code it. Pinned
        # to the network's first usable host after the gateway (.1).
        ipv4_address: 172.30.0.2
      static-egress-sandbox:
        # Static IP so /etc/143/sandbox-static-egress-resolv.conf can
        # hard-code the resolver on the static egress bridge.
        ipv4_address: 172.31.0.2
    healthcheck:
      test: ["CMD-SHELL", "nslookup localhost 127.0.0.1 >/dev/null 2>&1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.2"
        reservations:
          memory: 16M
          cpus: "0.05"

  worker:
    image: ghcr.io/assembledhq/143-server:${IMAGE_TAG:-latest}
    depends_on:
      chrome:
        condition: service_started
      gvisor-check:
        condition: service_completed_successfully
      # Block worker startup until sandbox-dns is answering queries.
      # Sandboxes spawned by an early worker would otherwise come up with no
      # working DNS and fail their first preview-infra lookup.
      sandbox-dns:
        condition: service_healthy
    # NODE_ID, WORKER_PRIVATE_IP, PREVIEW_INTERNAL_BASE_URL, WORKER_HOST_PORT,
    # and DOCKER_GID are runtime identity values. The stable host defaults live
    # in /opt/143/.env.local and deploy.sh overrides NODE_ID/HOST_PORT/BASE_URL
    # per blue/green generation so old and new worker containers can overlap.
    # The :? syntax fails the deploy loudly if required host values are missing
    # — without it, the internal preview API could bind to the public interface
    # or the node could heartbeat without a preview_internal_base_url.
    # If any error below fires, run: make provision-worker HOST=<this-host>
    environment:
      DATABASE_URL: "postgres://onefortythree:${DB_PASSWORD}@${DB_HOST}:5432/onefortythree?sslmode=disable&pool_max_conns=${WORKER_DATABASE_POOL_MAX_CONNS:-4}"
      ENV: production
      MODE: worker
      # Release channel this worker claims jobs for. Written into the host
      # .env by deploy.sh: 'canary' for worker-canary hosts, 'stable'
      # otherwise. See docs/design/118-canary-stable-release-channels.md.
      CHANNEL: ${CHANNEL:-stable}
      CHROME_WS_URL: ${CHROME_WS_URL:-ws://chrome:9222}
      MAX_CONCURRENT_RUNS: ${MAX_CONCURRENT_RUNS:-5}
      NODE_ID: ${NODE_ID:?missing in /opt/143/.env.local}
      WORKER_PREVIEW_DRAIN_TIMEOUT: ${WORKER_PREVIEW_DRAIN_TIMEOUT:-2h}
      PREVIEW_INTERNAL_BASE_URL: ${PREVIEW_INTERNAL_BASE_URL:?missing in /opt/143/.env.local}
      PREVIEW_ORIGIN_TEMPLATE: ${PREVIEW_ORIGIN_TEMPLATE:-https://{id}.preview.143.dev}
      SESSION_EXECUTOR_IMAGE: ghcr.io/assembledhq/143-server:${IMAGE_TAG:-latest}
      SESSION_EXECUTOR_DOCKER_NETWORK: ${SESSION_EXECUTOR_DOCKER_NETWORK:-143_default}
      SANDBOX_IMAGE: ghcr.io/assembledhq/143-sandbox:${IMAGE_TAG:-latest}
      SANDBOX_CACHE_ABI: ${SANDBOX_CACHE_ABI:-ubuntu24.04-node24-go1.26-v1}
      SANDBOX_RUNTIME: runsc
      SANDBOX_REQUIRE_GVISOR: "true"
      SANDBOX_HEALTH_CHECK_IMAGE: ${SANDBOX_HEALTH_CHECK_IMAGE:-busybox:1.36.1}
      PREVIEW_DEPENDENCY_CACHE_LOCAL_DIR: ${PREVIEW_DEPENDENCY_CACHE_LOCAL_DIR:-/var/cache/143/preview-dependency-cache}
      # Bind-mounted into every sandbox at /etc/resolv.conf. The path here is
      # the *host* path because docker.sock resolves bind sources against the
      # host, not this worker container. Provisioned by provision.sh.
      SANDBOX_RESOLV_CONF: /etc/143/sandbox-resolv.conf
      STATIC_EGRESS_PUBLIC_IP: ${STATIC_EGRESS_PUBLIC_IP:-}
    env_file:
      - .env
    # App nodes reach this worker at http://${WORKER_PRIVATE_IP}:${WORKER_HOST_PORT}
    # over the private fleet network to drive preview start/stop and proxy
    # browser HTTP/WebSocket traffic. Binding to the private IP (not 0.0.0.0)
    # keeps the internal API off the public interface. WORKER_HOST_PORT defaults
    # to 8080 for first boot and is varied by deploy.sh for blue/green overlap.
    ports:
      - "${WORKER_PRIVATE_IP:?missing in /opt/143/.env.local}:${WORKER_HOST_PORT:-8080}:8080"
    networks:
      # The worker must join 143-sandbox to dial preview/sandbox container IPs,
      # but DB/private-fleet traffic must keep using the normal compose bridge
      # default gateway. If Docker picks 143-sandbox as the default route,
      # startup DB pings go through the sandbox egress path and time out.
      default:
        gw_priority: 1
      sandbox:
        gw_priority: 0
      static-egress-sandbox:
        gw_priority: 0
    group_add:
      - ${DOCKER_GID:?missing in /opt/143/.env.local}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/143:/etc/143:ro
      # Per-session GitHub credential sockets. Bind-mounted into this
      # container so the orchestrator (running as appuser uid 1000) can
      # create per-session unix sockets here, AND so the host docker
      # daemon — which resolves bind sources against the host filesystem
      # when wiring those sockets into sandbox containers — sees the same
      # path. The host directory is provisioned 0750 and owned 1000:1000
      # via systemd-tmpfiles in deploy/scripts/provision.sh.
      - /var/run/143/sandbox-auth:/var/run/143/sandbox-auth
      # Worker-local preview dependency cache L1. This must be host-backed so
      # DB cache-location hints remain useful after worker container recreates.
      - /var/cache/143/preview-dependency-cache:/var/cache/143/preview-dependency-cache
      # Provisioning must stage this file before the first `docker compose up`.
      # If the bind source is missing, Docker creates a directory at the host
      # path and later deploy-time scp of the encrypted env file fails.
      # Mounted at /app (the workdir) — docker-entrypoint.sh resolves the
      # bundle relative to the workdir; the image itself carries no secrets.
      - .env.production.enc:/app/.env.production.enc:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Must be ≥ in-process WORKER_DRAIN_TIMEOUT + WORKER_PREVIEW_DRAIN_TIMEOUT
    # (internal/config/config.go defaults 45m + 2h) so Docker doesn't SIGKILL
    # the process while it is still draining in-flight coding turns or serving
    # existing previews. This is the binding outer cap: both `--force-recreate`
    # and any plain `docker stop` / `docker compose restart` go through
    # stop_grace_period. deploy/scripts/deploy.sh's
    # WORKER_DEPLOY_DRAIN_TIMEOUT_SECONDS (default 14400s) is a polling
    # ceiling for the SIGTERM-then-wait loop, not a separate drain budget.
    stop_grace_period: 3h
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

# The 143-sandbox bridge is created out-of-band by deploy/scripts/provision.sh
# (with a pinned --subnet of 172.30.0.0/24 so sandbox-dns can have a stable
# IP). Declared external here so compose attaches to the existing network
# instead of creating its own.
networks:
  default:
    external: true
    name: 143_default
  sandbox:
    external: true
    name: 143-sandbox
  static-egress-sandbox:
    external: true
    name: 143-sandbox-static-egress
