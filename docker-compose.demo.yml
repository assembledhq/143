# Public direct-entry demo stack for one small host.
# Run from /opt/143-demo with:
#   docker compose --env-file .env.demo -f docker-compose.demo.yml up -d

services:
  caddy:
    image: caddy:2.10-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env.demo}
    volumes:
      - ./deploy/Caddyfile.demo:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/assembledhq}/143-frontend:${IMAGE_TAG:-latest}
    environment:
      API_PROXY_TARGET: http://api:8080
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://127.0.0.1:3000/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  api:
    image: ${IMAGE_REGISTRY:-ghcr.io/assembledhq}/143-server:${IMAGE_TAG:-latest}
    env_file:
      - .env.demo
    environment:
      DATABASE_URL: postgres://onefortythree:${DB_PASSWORD:?set DB_PASSWORD in .env.demo}@postgres:5432/onefortythree?sslmode=disable
      DATABASE_MAX_CONNS: ${DATABASE_MAX_CONNS:-10}
      DATABASE_MAX_CONN_IDLE_TIME: ${DATABASE_MAX_CONN_IDLE_TIME:-5m}
      REDIS_URL: redis://redis:6379/0
      PORT: "8080"
      ENV: production
      MODE: api
      BASE_URL: ${BASE_URL:?set BASE_URL in .env.demo}
      FRONTEND_URL: ${FRONTEND_URL:?set FRONTEND_URL in .env.demo}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS in .env.demo}
      DEMO_MODE: "true"
      DEMO_READ_ONLY: "true"
      DEMO_ENTRY_EMAIL: ${DEMO_ENTRY_EMAIL:-preview-viewer@143.dev}
      PREVIEW_GATEWAY_PORT: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      demo-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  migrate:
    image: ${IMAGE_REGISTRY:-ghcr.io/assembledhq}/143-server:${IMAGE_TAG:-latest}
    env_file:
      - .env.demo
    environment:
      DATABASE_URL: postgres://onefortythree:${DB_PASSWORD:?set DB_PASSWORD in .env.demo}@postgres:5432/onefortythree?sslmode=disable
    command: ["/bin/migrate", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  demo-seed:
    image: ${IMAGE_REGISTRY:-ghcr.io/assembledhq}/143-server:${IMAGE_TAG:-latest}
    env_file:
      - .env.demo
    environment:
      DEMO_SEED_DATABASE_URL: postgres://onefortythree:${DB_PASSWORD:?set DB_PASSWORD in .env.demo}@postgres:5432/onefortythree?sslmode=disable
      ALLOW_DEMO_SEED_APPLY: "true"
      DEMO_MODE: "true"
    command: ["/bin/demo-seed", "apply", "--skip-migrations", "--seed", "/demo-seed"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  postgres:
    image: postgres:18
    shm_size: 512m
    environment:
      POSTGRES_DB: onefortythree
      POSTGRES_USER: onefortythree
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env.demo}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onefortythree -d onefortythree"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    image: redis:8.6-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  caddy_data:
  pgdata:
  redisdata:
