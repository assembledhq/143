version: "2"

linters:
  default: standard

  settings:
    errcheck:
      exclude-functions:
        - (*net/http.ResponseWriter).Write
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - fmt.Fprintf
        - fmt.Fprint
        - io.Copy
      check-blank: false
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST1000"

  enable:
    - paralleltest

  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
