services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: onefortythree
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: onefortythree
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onefortythree"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: golang:1.24
    working_dir: /app
    command: >
      sh -c "go install github.com/air-verse/air@latest &&
             go run cmd/migrate/main.go up &&
             air"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://onefortythree:dev@postgres:5432/onefortythree?sslmode=disable
      PORT: "8080"
      LOG_LEVEL: debug
      MODE: all
      BASE_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - server
    environment:
      API_PROXY_TARGET: http://server:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  pgdata:
  go_mod_cache:
  go_build_cache:
