services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: onefortythree
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: onefortythree
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onefortythree"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  server:
    image: golang:1.26
    working_dir: /app
    command: >
      sh -c "go install github.com/air-verse/air@latest &&
             go run cmd/migrate/main.go up &&
             air"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://onefortythree:dev@postgres:5432/onefortythree?sslmode=disable
      PORT: "8080"
      LOG_LEVEL: debug
      MODE: all
      BASE_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-3000}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - go_bin_cache:/go/bin  # cache compiled binaries (e.g. air) across restarts
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  frontend:
    image: node:22-alpine
    working_dir: /app
    # npm ci is faster than npm install and uses package-lock.json exactly.
    # The node_modules volume persists packages across restarts so subsequent
    # starts only verify the lockfile rather than re-downloading everything.
    command: sh -c "npm ci && npm run dev"
    depends_on:
      - server
    environment:
      API_PROXY_TARGET: http://server:8080
      NODE_ENV: development
      # Cap the Node.js V8 heap so the process doesn't expand to fill all
      # available container memory before triggering GC.
      NODE_OPTIONS: "--max-old-space-size=512"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # persist node_modules across restarts
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

volumes:
  pgdata:
  go_mod_cache:
  go_build_cache:
  go_bin_cache:            # persists compiled Go tool binaries (air, etc.)
  frontend_node_modules:   # persists node_modules between container restarts
