services:
  sandbox:
    image: 143-sandbox:latest
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    profiles:
      - sandbox

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: onefortythree
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: onefortythree
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onefortythree"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  server:
    image: golang:1.26
    restart: on-failure:3
    working_dir: /app
    command: >
      sh -c "apt-get update &&
             apt-get install -y --no-install-recommends libheif-examples &&
             rm -rf /var/lib/apt/lists/* &&
             go install github.com/air-verse/air@latest &&
             go run cmd/migrate/main.go up &&
             air"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://onefortythree:dev@postgres:5432/onefortythree?sslmode=disable
      PORT: "8080"
      LOG_LEVEL: debug
      MODE: all
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-3000}}
      PREVIEW_ORIGIN_TEMPLATE: "http://{id}.preview.localhost:9090"
      PREVIEW_GATEWAY_PORT: "9090"
      CHROME_WS_URL: "ws://chrome:9222"
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - go_bin_cache:/go/bin  # cache compiled binaries (e.g. air) across restarts
      - /var/run/docker.sock:/var/run/docker.sock  # allow server to create sandbox containers
    networks:
      - default
      - preview-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  chrome:
    image: chromedp/headless-shell:latest
    shm_size: 256m
    networks:
      - default
      - preview-net
    deploy:
      resources:
        # Reserve a baseline so chromedp can complete screenshots/inspections
        # even when other services are busy; limits cap the ceiling.
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  frontend:
    image: node:22-alpine
    working_dir: /app
    # npm ci is faster than npm install and uses package-lock.json exactly.
    # The node_modules volume persists packages across restarts so subsequent
    # starts only verify the lockfile rather than re-downloading everything.
    command: sh -c "npm ci && npm run dev"
    depends_on:
      - server
    environment:
      API_PROXY_TARGET: http://server:8080
      NODE_ENV: development
      # Cap the Node.js V8 heap so the process doesn't expand to fill all
      # available container memory before triggering GC.
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # persist node_modules across restarts
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "2.0"

volumes:
  pgdata:
  go_mod_cache:
  go_build_cache:
  go_bin_cache:            # persists compiled Go tool binaries (air, etc.)
  frontend_node_modules:   # persists node_modules between container restarts

networks:
  # preview-net is the shared Docker bridge that hosts the sandbox and all
  # preview infrastructure containers.
  #
  # SECURITY: Bridge networks permit intra-network container-to-container
  # traffic by default. Containers on 143-sandbox can reach each other on
  # any port, so a preview running AI-generated code could probe sibling
  # previews. This is acceptable for single-user self-hosted deployments
  # (the common case for this project). Multi-tenant deployments should
  # either run a 143 server per tenant, supply a per-org network via
  # DockerPreviewProvider's WithPreviewNetwork option, or front Docker with
  # an orchestrator that enforces NetworkPolicies (Kubernetes, Nomad, etc.).
  # See internal/services/preview/providers/docker_preview.go for details.
  preview-net:
    name: 143-sandbox
    driver: bridge
