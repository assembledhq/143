#cloud-config
# Worker node bootstrap (agent sandboxes with gVisor).
# Connects to a remote Postgres instance via DB_HOST.
#
# Provision from your local machine:
#   make provision-worker HOST=87.99.158.39
#
# Or manually substitute and pass as user-data:
#   export SSH_PUBLIC_KEY="$(cat ~/.ssh/143-deploy.pub)"
#   export GHCR_TOKEN="ghp_xxxx"
#   export SOPS_AGE_KEY="AGE-SECRET-KEY-xxxx"
#   export DB_PASSWORD="your-db-password"
#   export DB_HOST="10.0.0.3"
#   export GITHUB_APP_CLIENT_ID="Iv1.0123456789abcdef"
#   export GITHUB_APP_CLIENT_SECRET="your_github_app_client_secret"
#   export NODE_ID="worker-1"
#   export WORKER_PRIVATE_IP="10.0.0.12"            # this worker's private IPv4
#   export PREVIEW_INTERNAL_BASE_URL="http://10.0.0.12:8080"  # usually http://${WORKER_PRIVATE_IP}:8080
#   export TS_AUTH_KEY="tskey-auth-..."             # optional: enroll this host in Tailscale
#   export TS_TAG="tag:prod-worker"                 # optional: Tailscale ACL tag
#   export TS_HOSTNAME="$NODE_ID"                   # optional: Tailscale device name
#   export CHROME_WS_URL="ws://chrome:9222"
#   export ENV_PRODUCTION_ENC_B64="$(base64 < .env.production.enc)"
#   export REPO_URL="https://github.com/assembledhq/143.git"
#   envsubst < deploy/cloud-init/worker.yml > /tmp/user-data.yml
#
# NODE_ID, WORKER_PRIVATE_IP, and PREVIEW_INTERNAL_BASE_URL are *per-host*
# identity. They are written to /opt/143/.env.local once at bootstrap and
# preserved across deploys (deploy.sh only rewrites /opt/143/.env, then
# concatenates .env.local back in for docker compose). This split is what
# lets the same .env.production.enc deploy to every worker in the fleet.
# Workers must also stage /opt/143/.env.production.enc before the first
# `docker compose up`: if the bind-mount source path is missing, Docker will
# create a directory at that path and future scp updates will fail.

users:
  - name: deploy
    groups: docker
    shell: /bin/bash
    # No sudo here — narrow NOPASSWD grant is installed by deploy/scripts/bootstrap.sh
    # on the first `make provision-<role>` run. Cloud-init's runcmd doesn't need
    # sudo (it runs as root and uses `su - deploy -c ...` for deploy-owned steps).
    ssh_authorized_keys:
      - ${SSH_PUBLIC_KEY}

packages:
  - docker.io
  - docker-compose-plugin
  - git
  - jq
  - curl
  - iptables-persistent

runcmd:
  # Optional Tailscale enrollment for cross-region workers. WORKER_PRIVATE_IP
  # should be set to the resulting `tailscale ip -4` value when this node's
  # internal preview endpoint must be reachable outside the Hetzner datacenter.
  - |
    TS_AUTH_KEY_VALUE="${TS_AUTH_KEY}"
    if [ -n "$TS_AUTH_KEY_VALUE" ]; then
      curl -fsSL https://tailscale.com/install.sh | sh
      TS_HOSTNAME_VALUE="${TS_HOSTNAME}"
      if [ -z "$TS_HOSTNAME_VALUE" ]; then
        TS_HOSTNAME_VALUE="${NODE_ID}"
      fi
      TS_TAG_VALUE="${TS_TAG}"
      if [ -z "$TS_TAG_VALUE" ]; then
        TS_TAG_VALUE="tag:prod-worker"
      fi
      tailscale up --auth-key="$TS_AUTH_KEY_VALUE" --hostname="$TS_HOSTNAME_VALUE" --advertise-tags="$TS_TAG_VALUE" --accept-dns=false
      tailscale ip -4
    fi

  # Install gVisor
  - curl -fsSL https://gvisor.dev/archive.key | gpg --dearmor -o /usr/share/keyrings/gvisor-archive-keyring.gpg
  - echo "deb [arch=amd64 signed-by=/usr/share/keyrings/gvisor-archive-keyring.gpg] https://storage.googleapis.com/gvisor/releases release main" > /etc/apt/sources.list.d/gvisor.list
  - apt-get update && apt-get install -y runsc
  - runsc install -- --ignore-cgroups --host-uds=open
  - systemctl restart docker

  # Set up GHCR access (token written to file to avoid leaking in cloud-init logs)
  - su - deploy -c 'cat /opt/143/.ghcr-token | docker login ghcr.io -u deploy --password-stdin && rm -f /opt/143/.ghcr-token'

  # Clone repo to get compose files. These copies are first-boot fanout:
  # the compose `up` below runs before any operator `make provision-worker`
  # / `make deploy-worker` step, so every file the `include:` directive
  # references (vector, dns-probe) must already be on disk. provision.sh
  # re-syncs the same files later and is the canonical source for ongoing
  # changes — duplication is intentional.
  - su - deploy -c 'git clone --depth 1 ${REPO_URL} /tmp/143-repo'
  - su - deploy -c 'cp /tmp/143-repo/docker-compose.worker.yml /opt/143/'
  - su - deploy -c 'cp /tmp/143-repo/docker-compose.vector.yml /opt/143/'
  - su - deploy -c 'cp /tmp/143-repo/docker-compose.dns-probe.yml /opt/143/'
  - su - deploy -c 'cp /tmp/143-repo/Dockerfile.dnsmasq /opt/143/'
  - su - deploy -c 'cp -r /tmp/143-repo/deploy /opt/143/deploy'
  - rm -rf /tmp/143-repo

  # Pull images
  - su - deploy -c 'docker pull ghcr.io/assembledhq/143-server:latest'
  - su - deploy -c 'docker pull ghcr.io/assembledhq/143-sandbox:latest'
  - su - deploy -c 'docker pull chromedp/headless-shell:latest'

  # Create the shared sandbox egress network with the same pinned subnet used
  # by provision.sh and deploy.sh. The subnet lets sandbox-dns claim the static
  # 172.30.0.2 IP that /etc/143/sandbox-resolv.conf points at. Leave bridge ICC
  # at Docker's default so gVisor sandboxes can reach sandbox-dns on the bridge.
  - su - deploy -c 'docker network inspect 143-sandbox >/dev/null 2>&1 || docker network create --driver bridge --subnet 172.30.0.0/24 --label managed-by=143 143-sandbox'

  # Apply host-level egress rules: block sandbox traffic to cloud metadata
  # and RFC1918. Must run AFTER the network exists (reads its subnet).
  - /opt/143/deploy/scripts/sandbox-firewall.sh 143-sandbox

  # Write the resolv.conf that sandboxes bind-mount at /etc/resolv.conf.
  # This must stay aligned with the sandbox-dns static IP in the worker compose
  # file, so use the same shared writer as provision.sh and deploy.sh.
  - /opt/143/deploy/scripts/sandbox-resolv-conf.sh

  # Apply kernel tuning
  - sysctl -p /etc/sysctl.d/99-worker.conf

  # Concatenate per-host identity (.env.local) into the shared .env so docker
  # compose can interpolate ${NODE_ID}, ${WORKER_PRIVATE_IP}, etc. when it
  # parses docker-compose.worker.yml. Subsequent deploys (deploy.sh) repeat
  # this step so .env.local stays the source of truth for per-host values.
  - su - deploy -c 'cat /opt/143/.env.local >> /opt/143/.env'

  # Start the worker
  - su - deploy -c 'cd /opt/143 && docker compose -f docker-compose.worker.yml up -d --remove-orphans'

write_files:
  # Workers need the shared encrypted production env and age key because the
  # runtime reads GitHub App creds and other rotate-at-deploy settings from
  # .env.production.enc at container start. The encrypted file must exist
  # before docker compose starts or Docker will create a directory at the
  # bind-mount source path.
  - path: /opt/143/.env
    owner: deploy:deploy
    permissions: '0600'
    content: |
      SOPS_AGE_KEY=${SOPS_AGE_KEY}
      DB_PASSWORD=${DB_PASSWORD}
      DB_HOST=${DB_HOST}
      GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID}
      GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET}
      CHROME_WS_URL=${CHROME_WS_URL}
      SANDBOX_HEALTH_CHECK_IMAGE=${SANDBOX_HEALTH_CHECK_IMAGE}
      SANDBOX_REQUIRE_DISK_QUOTA=true
      SANDBOX_GC_INTERVAL=5m
      SANDBOX_GC_GRACE=30m
      SANDBOX_GC_HARD_MAX=24h

  # Per-host identity. Stays put across deploys — deploy.sh only rewrites
  # /opt/143/.env, then re-appends this file. If you re-IP the host or
  # rename the node, edit this file directly and `docker compose up -d`.
  - path: /opt/143/.env.local
    owner: deploy:deploy
    permissions: '0600'
    content: |
      NODE_ID=${NODE_ID}
      WORKER_PRIVATE_IP=${WORKER_PRIVATE_IP}
      PREVIEW_INTERNAL_BASE_URL=${PREVIEW_INTERNAL_BASE_URL}

  - path: /opt/143/.ghcr-token
    owner: deploy:deploy
    permissions: '0600'
    content: ${GHCR_TOKEN}

  - path: /opt/143/.env.production.enc
    owner: deploy:deploy
    permissions: '0600'
    encoding: b64
    content: ${ENV_PRODUCTION_ENC_B64}

  - path: /etc/sysctl.d/99-worker.conf
    content: |
      vm.swappiness = 1
