#cloud-config
# App node bootstrap (API + Frontend + Caddy).
# Connects to a remote Postgres instance via DB_HOST.
#
# Provision from your local machine:
#   make provision-app HOST=87.99.150.138
#
# Or manually substitute and pass as user-data:
#   export SSH_PUBLIC_KEY="$(cat ~/.ssh/143-deploy.pub)"
#   export GHCR_TOKEN="ghp_xxxx"
#   export SOPS_AGE_KEY="AGE-SECRET-KEY-xxxx"
#   export DB_PASSWORD="your-db-password"
#   export DB_HOST="10.0.0.3"
#   export NODE_ID="app-1"
#   export ENV_PRODUCTION_ENC_B64="$(base64 < .env.production.enc)"
#   export REPO_URL="https://github.com/assembledhq/143.git"
#   envsubst < deploy/cloud-init/app.yml > /tmp/user-data.yml

users:
  - name: deploy
    groups: docker
    shell: /bin/bash
    # No sudo here — narrow NOPASSWD grant is installed by deploy/scripts/bootstrap.sh
    # on the first `make provision-<role>` run. Cloud-init's runcmd doesn't need
    # sudo (it runs as root and uses `su - deploy -c ...` for deploy-owned steps).
    ssh_authorized_keys:
      - ${SSH_PUBLIC_KEY}

packages:
  - docker.io
  - docker-compose-plugin
  - git
  - jq
  - curl

runcmd:
  # Set up GHCR access (token written to file to avoid leaking in cloud-init logs)
  - su - deploy -c 'cat /opt/143/.ghcr-token | docker login ghcr.io -u deploy --password-stdin && rm -f /opt/143/.ghcr-token'

  # Clone repo to get compose files, Caddyfile, and configs. These copies
  # are first-boot fanout: docker-compose.app.yml below is run before any
  # operator `make provision-app` / `make deploy-app` step gets a chance,
  # so every file the compose `include:` directive references must already
  # be on disk here. provision.sh re-syncs the same files later (and is
  # the canonical source for ongoing changes); the duplication is
  # intentional, not dead weight.
  - su - deploy -c 'git clone --depth 1 ${REPO_URL} /tmp/143-repo'
  - su - deploy -c 'cp /tmp/143-repo/docker-compose.app.yml /opt/143/'
  - su - deploy -c 'cp /tmp/143-repo/docker-compose.vector.yml /opt/143/'
  - su - deploy -c 'cp /tmp/143-repo/docker-compose.dns-probe.yml /opt/143/'
  - su - deploy -c 'cp -r /tmp/143-repo/deploy /opt/143/deploy'
  - rm -rf /tmp/143-repo

  # Pull images
  - su - deploy -c 'docker pull ghcr.io/assembledhq/143-server:latest'
  - su - deploy -c 'docker pull ghcr.io/assembledhq/143-frontend:latest'

  # Start the stack and wait for health before migrating
  - su - deploy -c 'cd /opt/143 && docker compose -f docker-compose.app.yml up -d --remove-orphans'
  - |
    echo "Waiting for API health check..."
    HEALTHY=false
    for i in $(seq 1 30); do
      if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
        echo "Health check passed."
        HEALTHY=true
        break
      fi
      sleep 2
    done
    if [ "$HEALTHY" != "true" ]; then
      echo "ERROR: Health check timed out after 60s — aborting before migrations."
      exit 1
    fi
  - su - deploy -c 'cd /opt/143 && docker compose -f docker-compose.app.yml exec -T api /bin/migrate up'

write_files:
  - path: /opt/143/.env
    owner: deploy:deploy
    permissions: '0600'
    content: |
      SOPS_AGE_KEY=${SOPS_AGE_KEY}
      DB_PASSWORD=${DB_PASSWORD}
      DB_HOST=${DB_HOST}
      NODE_ID=${NODE_ID}

  - path: /opt/143/.ghcr-token
    owner: deploy:deploy
    permissions: '0600'
    content: ${GHCR_TOKEN}

  - path: /opt/143/.env.production.enc
    owner: deploy:deploy
    permissions: '0600'
    encoding: b64
    content: ${ENV_PRODUCTION_ENC_B64}
