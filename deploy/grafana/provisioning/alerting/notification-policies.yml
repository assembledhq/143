apiVersion: 1

policies:
  - orgId: 1
    receiver: platform-warning
    group_by:
      - service
      - severity
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: platform-critical
        object_matchers:
          - ['severity', '=', 'critical']
      - receiver: platform-warning
        object_matchers:
          - ['severity', '=', 'warning']
