groups:
  - name: api-errors
    type: vlogs
    interval: 1m
    rules:
      - alert: API5xxBurstWarning
        expr: '_time:5m service:api AND level:error AND _msg:"request failed" AND status:range[500,599] | stats count() as errors | filter errors:>9'
        for: 1m
        labels:
          service: api
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'API 5xx burst warning'
          description: 'The API emitted {{ $value }} server-error responses in the last 5 minutes.'
          runbook: 'Check VictoriaLogs for service=api level=error _msg="request failed" status:range[500,599].'
      - alert: API5xxBurstCritical
        expr: '_time:5m service:api AND level:error AND _msg:"request failed" AND status:range[500,599] | stats count() as errors | filter errors:>24'
        for: 1m
        labels:
          service: api
          severity: critical
          team: platform
          signal: logs
        annotations:
          summary: 'API 5xx burst critical'
          description: 'The API emitted {{ $value }} server-error responses in the last 5 minutes.'
          runbook: 'Check VictoriaLogs for service=api level=error _msg="request failed" status:range[500,599].'
      - alert: EndpointFailureBurst
        expr: '_time:10m service:api AND level:error AND _msg:"request failed" AND status:range[500,599] | stats by (path) count() as errors | filter errors:>4 | fields path, errors'
        for: 1m
        labels:
          service: api
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'Endpoint failure burst for {{ $labels.path }}'
          description: 'Endpoint {{ $labels.path }} emitted {{ $value }} server-error responses in the last 10 minutes.'
          runbook: 'Inspect recent request-failed logs for the affected path in VictoriaLogs.'
      - alert: APIReadinessFailure
        expr: '_time:5m service:api AND level:warn AND _msg:"readiness check failed: database unavailable" | stats count() as failures | filter failures:>2'
        for: 1m
        labels:
          service: api
          severity: critical
          team: platform
          signal: logs
        annotations:
          summary: 'API readiness failures'
          description: 'The readiness endpoint logged {{ $value }} database-unavailable failures in the last 5 minutes.'
          runbook: 'Check database connectivity, app readiness logs, and the DB node before restarting services.'
      - alert: APIStreamDegradation
        expr: '_time:15m service:api AND level:error AND _msg:"failed to write log event to SSE stream" | stats count() as failures | filter failures:>9'
        for: 1m
        labels:
          service: api
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'SSE/log streaming degradation'
          description: 'The API logged {{ $value }} SSE stream write failures in the last 15 minutes.'
          runbook: 'Inspect session log streaming paths and correlate with deploys or client disconnect spikes.'

  - name: worker-failures
    type: vlogs
    interval: 1m
    rules:
      - alert: WorkerFatalFailuresWarning
        expr: '_time:10m service:worker AND level:error AND _msg:"job failed (fatal, skipping retries)" | stats count() as failures | filter failures:>4'
        for: 1m
        labels:
          service: worker
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'Worker fatal failures warning'
          description: 'Workers logged {{ $value }} fatal job failures in the last 10 minutes.'
          runbook: 'Inspect worker error logs and recent failing job types in Grafana/VictoriaLogs.'
      - alert: WorkerFatalFailuresCritical
        expr: '_time:10m service:worker AND level:error AND _msg:"job failed (fatal, skipping retries)" | stats count() as failures | filter failures:>19'
        for: 1m
        labels:
          service: worker
          severity: critical
          team: platform
          signal: logs
        annotations:
          summary: 'Worker fatal failures critical'
          description: 'Workers logged {{ $value }} fatal job failures in the last 10 minutes.'
          runbook: 'Treat this as an async pipeline incident and inspect worker logs, job backlog, and DB health.'
      - alert: WorkerDeployBudgetExpiredStops
        expr: '_time:30m service:worker AND _msg:"deploy budget expired; requested typed session stop" | stats count() as stops | filter stops:>0'
        for: 1m
        labels:
          service: worker
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'Worker deploy budget expired active sessions'
          description: '{{ $value }} session executor(s) hit the deploy runtime ceiling during a routine blue/green drain in the last 30 minutes.'
          runbook: 'Inspect worker_deploy_events and session runtime_stop_reason=deploy_budget_expired. This should checkpoint/requeue, not lose work; investigate if it fires frequently.'
      - alert: WorkerDeployStopRejected
        expr: '_time:15m service:worker AND _msg:"deploy budget expired but session stop request was not accepted" | stats count() as rejected | filter rejected:>0'
        for: 1m
        labels:
          service: worker
          severity: critical
          team: platform
          signal: logs
        annotations:
          summary: 'Worker deploy stop request rejected'
          description: '{{ $value }} over-budget session executor(s) could not request the typed checkpoint stop during drain.'
          runbook: 'Check worker logs for executor_id/session_id, confirm the session is still live, and manually recover or force maintenance if it cannot checkpoint.'
      - alert: WorkerDeployPreviewUnavailable
        expr: '_time:30m (service:worker OR service:api) AND ("deploy_drain_timeout" OR "preview runtime unavailable") | stats count() as unavailable | filter unavailable:>0'
        for: 1m
        labels:
          service: worker
          severity: critical
          team: platform
          signal: logs
        annotations:
          summary: 'Preview became unavailable during deploy'
          description: '{{ $value }} preview unavailable event(s) carried deploy-specific reasons in the last 30 minutes.'
          runbook: 'Inspect preview_instances.unavailable_reason and worker_deploy_events for the affected node before reusing endpoints.'
      - alert: WorkerDeployEndpointReuseBlocked
        expr: '_time:30m service:worker AND _msg:"no reusable worker host port" | stats count() as blocked | filter blocked:>2'
        for: 1m
        labels:
          service: worker
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'Worker endpoint reuse repeatedly blocked'
          description: '{{ $value }} routine worker deploy attempts could not find a safe blue/green endpoint in the last 30 minutes.'
          runbook: 'Check active preview_runtimes by endpoint_url and expand WORKER_BLUE_GREEN_PORT_START/END before forcing maintenance.'
      - alert: WorkerDeployHumanInputCheckpointRelease
        expr: '_time:30m service:worker AND _msg:"session executor released ownership at human-input checkpoint" | stats count() as releases | filter releases:>0'
        for: 1m
        labels:
          service: worker
          severity: info
          team: platform
          signal: logs
        annotations:
          summary: 'Worker drain released executor at human input'
          description: '{{ $value }} draining executor(s) released ownership after committing a human-input checkpoint.'
          runbook: 'Use this as a positive deploy-drain signal; spikes are expected only during long routine worker rollouts.'

  - name: pr-pipeline-errors
    type: vlogs
    interval: 1m
    rules:
      - alert: PRCreationErrorBurst
        expr: '_time:15m service:worker AND level:error AND _msg:"open_pr failed" | stats count() as failures | filter failures:>4'
        for: 1m
        labels:
          service: worker
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'PR creation failures elevated'
          description: 'Workers logged {{ $value }} `open_pr failed` errors in the last 15 minutes.'
          runbook: 'Filter VictoriaLogs for service=worker _msg="open_pr failed". Check the wrapped error for git/GitHub auth, sandbox push, or createPullRequest API issues.'
      - alert: PRPushErrorBurst
        expr: '_time:15m service:worker AND level:error AND _msg:"push_pr_changes failed" | stats count() as failures | filter failures:>4'
        for: 1m
        labels:
          service: worker
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'PR push (push_pr_changes) failures elevated'
          description: 'Workers logged {{ $value }} `push_pr_changes failed` errors in the last 15 minutes.'
          runbook: 'Filter VictoriaLogs for service=worker _msg="push_pr_changes failed". Common causes: snapshot hydration, git push (token / branch protection), or sandbox creation.'

  - name: dns-health
    type: vlogs
    interval: 1m
    rules:
      # Each app + worker host runs the dns-probe container (see
      # docker-compose.dns-probe.yml) which logs `dns probe failed` on
      # every resolution failure. The 2026-05-07T04:15Z incident showed
      # the cost of finding out about upstream DNS trouble via cascading
      # symptoms (codex stream disconnects, git push errors); this alert
      # fires directly off the probe.
      - alert: DNSProbeFailures
        # Group by (target, hostname) so an OpenAI-side outage doesn't pull
        # github.com into the same alert and confuse the on-call ack, AND
        # so a host-local issue (one worker's daemon.json missing the dns
        # pin) is distinguishable from a fleet-wide upstream provider
        # outage. >2 in 5m means at least three consecutive failures of
        # the same target on the same host — the per-minute probe noise
        # floor is 0.
        expr: '_time:5m _msg:"dns probe failed" AND probe:dns | stats by (target, hostname) count() as failures | filter failures:>2 | fields target, hostname, failures'
        for: 1m
        labels:
          severity: critical
          team: platform
          signal: logs
        annotations:
          summary: 'DNS probe failures for {{ $labels.target }} on {{ $labels.hostname }}'
          description: 'The synthetic DNS probe on {{ $labels.hostname }} logged {{ $value }} failures resolving {{ $labels.target }} in the last 5 minutes.'
          runbook: 'Check /etc/docker/daemon.json `dns` config and host upstream resolver. Correlate with worker `Could not resolve host` errors and sandbox stream disconnects. If multiple hosts fire for the same target, suspect the upstream provider; if a single host fires across multiple targets, suspect that host''s daemon.json or local resolver.'

  - name: session-problems
    type: vlogs
    interval: 1m
    rules:
      - alert: SessionTimeoutBurst
        expr: '_time:30m level:error AND _msg:"session exceeded configured timeout" | stats count() as timeouts | filter timeouts:>9'
        for: 1m
        labels:
          service: worker
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'Session timeouts elevated'
          description: '{{ $value }} sessions hit the configured wall-clock timeout in the last 30 minutes.'
          runbook: 'Inspect orchestrator logs for stuck adapters, sandbox exec hangs, or misconfigured per-session deadlines.'
      - alert: ReaperErrorBurst
        expr: '_time:15m level:error AND _msg:~"^reaper:" | stats count() as errors | filter errors:>4'
        for: 1m
        labels:
          service: worker
          severity: warning
          team: platform
          signal: logs
        annotations:
          summary: 'Session reaper errors elevated'
          description: 'The session reaper logged {{ $value }} errors in the last 15 minutes.'
          runbook: 'Reaper errors usually indicate DB pressure or stale rows it cannot reconcile. Check DB health and recent reaper code paths.'

# Scheduler heartbeat and queue backlog alerts are intentionally not yet
# encoded here. The current system does not emit a dedicated scheduler
# heartbeat log line or backlog metric, so those rules would be noisy.
