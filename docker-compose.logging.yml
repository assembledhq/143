services:
  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    volumes:
      - vlogs-data:/victoria-logs-data
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=30d
      - -httpListenAddr=:9428
    ports:
      - "${PRIVATE_IP:-10.0.0.3}:9428:9428"  # bind to private network IP only
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  grafana:
    image: grafana/grafana:13.0.0
    environment:
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"  # localhost only — access via SSH tunnel or Caddy
    depends_on:
      - victorialogs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  vlogs-data:
  grafana-data:
