# Logging node (VictoriaLogs + Grafana).
# Receives logs from Vector collectors on app/worker nodes via Hetzner private network.
# Access Grafana via SSH tunnel: make logs SSH_KEY=~/.ssh/143-deploy
# See docs/design/47-logging-victorialogs.md

include:
  - docker-compose.vector.yml

services:
  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    volumes:
      - vlogs-data:/victoria-logs-data
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=30d
      - -httpListenAddr=:9428
    ports:
      - "${VICTORIALOGS_HOST}:9428:9428"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  alertmanager:
    image: quay.io/prometheus/alertmanager:v0.31.1
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        cat >/etc/alertmanager/config.yml <<EOF
        global:
          resolve_timeout: 5m
        route:
          receiver: warning-webhook
          group_by: [service, severity, alertname]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            - receiver: critical-webhook
              matchers:
                - severity="critical"
            - receiver: warning-webhook
              matchers:
                - severity="warning"
        receivers:
          - name: warning-webhook
            webhook_configs:
              - send_resolved: true
                url: "http://alert-slack-relay:8080/warning"
          - name: critical-webhook
            webhook_configs:
              - send_resolved: true
                url: "http://alert-slack-relay:8080/critical"
        EOF
        exec /bin/alertmanager --config.file=/etc/alertmanager/config.yml --storage.path=/alertmanager
    volumes:
      - alertmanager-data:/alertmanager
    depends_on:
      - alert-slack-relay
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  alert-slack-relay:
    image: python:3.12-alpine
    environment:
      GRAFANA_ALERTS_WARNING_WEBHOOK_URL: ${GRAFANA_ALERTS_WARNING_WEBHOOK_URL:-http://localhost:65535/disabled-warning}
      GRAFANA_ALERTS_CRITICAL_WEBHOOK_URL: ${GRAFANA_ALERTS_CRITICAL_WEBHOOK_URL:-http://localhost:65535/disabled-critical}
      PORT: 8080
    command:
      - python3
      - /opt/143/deploy/scripts/alertmanager_slack_relay.py
    volumes:
      - ./deploy:/opt/143/deploy:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  vmalert:
    image: victoriametrics/vmalert:v1.117.1
    command:
      - -datasource.url=http://victorialogs:9428
      - -notifier.url=http://alertmanager:9093
      - -rule=/etc/vmalert/rules/production-alerts.yml
      - -rule.defaultRuleType=vlogs
      - -rule.evalDelay=10s
      - -httpListenAddr=:8880
    volumes:
      - ./deploy/vmalert/rules:/etc/vmalert/rules:ro
    depends_on:
      - victorialogs
      - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  grafana:
    image: grafana/grafana:13.0.1
    environment:
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: http://localhost:9999
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:9999:3000"
    depends_on:
      - victorialogs
      - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Lightweight disk usage monitor. Emits JSON to stdout every 5 minutes,
  # which Vector (on this same host or externally) can pick up via docker_logs.
  # Grafana alert query: service:disk-monitor AND disk_used_pct:range(80, Inf)
  #
  # PID 1 is `sh` running `sleep 300`, which doesn't propagate SIGTERM — so a
  # default `docker stop` hangs the full 10s grace period before SIGKILL. During
  # `compose up --force-recreate` that 10s window races the rename/create flow
  # and the new container fails with a name conflict on `143-disk-monitor-1`.
  # The monitor is stateless, so SIGKILL with a 1s grace is safe and eliminates
  # the race.
  disk-monitor:
    image: alpine:3.21
    volumes:
      - /:/host:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          PCT=$$(df /host | awk 'NR==2 {gsub(/%/,""); print $$5}')
          echo "{\"level\":\"info\",\"service\":\"disk-monitor\",\"disk_used_pct\":$$PCT,\"message\":\"disk usage check\"}"
          sleep 300
        done
    stop_signal: SIGKILL
    stop_grace_period: 1s
    restart: unless-stopped

volumes:
  alertmanager-data:
  vlogs-data:
  grafana-data:
