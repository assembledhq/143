name: Build & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    if: >-
      github.repository == 'assembledhq/143' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    concurrency:
      group: deploy-build-${{ github.event.workflow_run.head_branch }}-${{ matrix.name }}
      cancel-in-progress: true
    strategy:
      matrix:
        include:
          - name: server
            image: ghcr.io/assembledhq/143-server
            context: .
            file: Dockerfile
          - name: sandbox
            image: ghcr.io/assembledhq/143-sandbox
            context: .
            file: sandbox/Dockerfile
          - name: frontend
            image: ghcr.io/assembledhq/143-frontend
            context: .
            file: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.event.workflow_run.head_sha }}
          build-args: |
            BUILD_SHA=${{ github.event.workflow_run.head_sha }}
          # Registry cache instead of type=gha. The 10 GB GHA cache ceiling
          # was constantly evicting our ~200 MB-per-image layer blobs across
          # the three matrix builds, busting the apt-install layer in
          # sandbox/Dockerfile and adding ~9 minutes to deploys. GHCR has
          # no size cap and persists until manually deleted; the cache lives
          # at <image>:buildcache alongside :latest and :<sha>.
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

  predeploy-latest:
    needs: build
    if: github.repository == 'assembledhq/143'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_deploy: ${{ steps.latest.outputs.should_deploy }}
    steps:
      - name: Confirm this SHA is still latest main
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          latest_sha="$(gh api "repos/$REPO/commits/main" --jq .sha)"
          if [ "$latest_sha" = "$EXPECTED_SHA" ]; then
            echo "This run is latest main; continuing deploy for $EXPECTED_SHA."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping stale deploy for $EXPECTED_SHA; latest main is $latest_sha."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: [build, predeploy-latest]
    if: github.repository == 'assembledhq/143' && needs.predeploy-latest.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    # A worker drain can hold a deploy job for up to ~45 minutes while
    # in-flight coding turns finish. Queue overlapping deploys instead of
    # running them in parallel. cancel-in-progress is false because deploy.sh
    # isn't safe to interrupt mid-flight.
    concurrency:
      group: deploy-fleet
      cancel-in-progress: false
    steps:
      - name: Confirm this SHA is still latest main after deploy lock
        id: deploy_latest
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          latest_sha="$(gh api "repos/$REPO/commits/main" --jq .sha)"
          if [ "$latest_sha" = "$EXPECTED_SHA" ]; then
            echo "This run is still latest main after acquiring deploy lock; continuing deploy for $EXPECTED_SHA."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping stale deploy for $EXPECTED_SHA after acquiring deploy lock; latest main is $latest_sha."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.deploy_latest.outputs.should_deploy == 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Encrypted env bundles live in the private 143-infra repo, not here.
      # INFRA_REPO_DEPLOY_KEY is the private half of a read-only deploy key
      # on that repo — a machine credential tied to the repo (not a person's
      # account), so it never expires and any maintainer can audit/rotate it.
      # .infra is gitignored so it can never leak into builds.
      - name: Check out private secrets repo
        if: steps.deploy_latest.outputs.should_deploy == 'true'
        uses: actions/checkout@v6
        with:
          repository: assembledhq/143-infra
          ssh-key: ${{ secrets.INFRA_REPO_DEPLOY_KEY }}
          path: .infra

      - name: Install sops and age
        if: steps.deploy_latest.outputs.should_deploy == 'true'
        run: |
          curl -fsSL https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64 -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops
          curl -fsSL https://dl.filippo.io/age/latest?for=linux/amd64 | tar xz -C /usr/local/bin --strip-components=1

      - name: Write SSH key and age key
        if: steps.deploy_latest.outputs.should_deploy == 'true'
        run: |
          mkdir -p ~/.ssh ~/.config/sops/age
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Decrypt FLEET_HOSTS
        if: steps.deploy_latest.outputs.should_deploy == 'true'
        # Decrypt once and propagate to later steps via $GITHUB_ENV so both
        # `Deploy fleet` (deploy-fleet.sh accepts FLEET_HOSTS from env) and
        # `Verify worker rollover` skip the SOPS round-trip.
        run: |
          set -euo pipefail
          fleet_hosts="$(SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt \
            sops --decrypt --input-type dotenv --output-type dotenv .infra/.env.production.enc \
            | grep '^FLEET_HOSTS=' | cut -d= -f2-)"
          if [ -z "$fleet_hosts" ]; then
            echo "ERROR: FLEET_HOSTS not present in .infra/.env.production.enc"
            exit 1
          fi
          echo "FLEET_HOSTS=$fleet_hosts" >> "$GITHUB_ENV"

      # Resolve the currently promoted stable release so the canary migration
      # gate (STABLE_MAX_MIGRATION) can refuse destructive migrations whose
      # lint:destructive-ok-after floor stable hasn't reached yet. No release
      # yet (pre-promotion or single-plane) leaves the gate off.
      # NOTE: the contents API caps directory listings at 1000 entries; at the
      # current migration cadence that is years of headroom.
      - name: Resolve stable release migration floor
        id: stable_floor
        if: steps.deploy_latest.outputs.should_deploy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Only an explicit HTTP 404 (no releases yet) leaves the gate off.
          # Any other failure aborts the deploy: treating an API outage as
          # "no release" would silently disarm the destructive-migration gate
          # and let gated contract migrations apply before stable is ready.
          body_file="$(mktemp)"
          if ! status="$(curl -sS -o "$body_file" -w '%{http_code}' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/latest")"; then
            echo "ERROR: could not reach the GitHub API for releases/latest." >&2
            exit 1
          fi
          case "$status" in
            200)
              tag="$(jq -r '.tag_name // empty' "$body_file")"
              if [ -z "$tag" ]; then
                echo "ERROR: releases/latest succeeded but carries no tag_name; refusing to disarm the migration gate:" >&2
                cat "$body_file" >&2
                exit 1
              fi
              ;;
            404) tag="" ;;
            *)
              echo "ERROR: releases/latest returned HTTP $status:" >&2
              cat "$body_file" >&2
              exit 1
              ;;
          esac
          if [ -z "$tag" ]; then
            echo "No stable release yet; destructive-migration gate is off."
            echo "stable_max_migration=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          max="$(gh api "repos/$REPO/contents/migrations?ref=$tag" --paginate \
            --jq '.[].name | select(test("^[0-9]+_.*\\.up\\.sql$")) | split("_")[0]' \
            | sort -n | tail -1)"
          echo "Stable release $tag carries migrations up to ${max:-none}."
          echo "stable_max_migration=$max" >> "$GITHUB_OUTPUT"

      - name: Deploy fleet
        if: steps.deploy_latest.outputs.should_deploy == 'true'
        # WORKER_DEPLOY_DETACH=1 makes deploy.sh kick off the worker rollover
        # as a host-side background process and return immediately, so the
        # SSH session (= a billed CI minute) doesn't sit idle for the up-to-
        # 45m drain. Rollover progress is logged to /var/log/143/deploy-worker-*.log
        # on the host; the verify step below polls the status file.
        # The worker port range is required for true blue/green deploys: the new
        # generation binds a free port while old worker generations keep serving
        # previews on their existing endpoints until their preview drain windows
        # expire. Keep the app-to-worker private network open for this range.
        #
        # DEPLOY_ROLES phases the canary/stable split without workflow edits
        # (design doc 118):
        #   unset               -> "app,worker"                        (single plane, today)
        #   Phase 2 transition  -> "app-canary,app,worker,worker-canary" (both planes track main)
        #   Phase 3 pinned      -> "app-canary,worker-canary"          (stable moves via promote.yml)
        env:
          WORKER_DEPLOY_DETACH: "1"
          WORKER_BLUE_GREEN_PORT_START: "8080"
          WORKER_BLUE_GREEN_PORT_END: "8087"
          # Stable path (instead of mktemp) so the upload step below can
          # capture every per-host log when any deploy fails.
          DEPLOY_FLEET_LOG_DIR: /tmp/deploy-fleet-logs
          SECRETS_DIR: ${{ github.workspace }}/.infra
          DEPLOY_ROLES: ${{ vars.DEPLOY_ROLES || 'app,worker' }}
          STABLE_MAX_MIGRATION: ${{ steps.stable_floor.outputs.stable_max_migration }}
        run: |
          chmod +x deploy/scripts/deploy.sh deploy/scripts/deploy-fleet.sh
          ./deploy/scripts/deploy-fleet.sh ~/.ssh/deploy-key "${{ github.event.workflow_run.head_sha }}" "$DEPLOY_ROLES"

      - name: Upload per-host deploy logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-fleet-logs
          path: /tmp/deploy-fleet-logs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Verify worker rollover
        if: steps.deploy_latest.outputs.should_deploy == 'true'
        # The detached rollover writes /var/log/143/deploy-worker-<sha>.status
        # with content "ok" on success or "fail: ..." on failure. Poll each
        # worker host until we see one of those, or until the budget expires.
        #
        # Routine blue/green deploys do not wait for old worker generations
        # to finish draining; they start green, mark blue draining, then let
        # host-side retire loops clean up old owners. This timeout only needs
        # to cover green startup, DB heartbeat, preflight/mark-draining, and
        # prune overhead. Poll workers in parallel so multiple hosts do not
        # multiply CI runner time on a stuck rollout.
        #
        # Timeout vs host state: a verify timeout fails the workflow run,
        # but the detached host-side rollover keeps going and may still
        # succeed afterwards. The next deploy queues on the workflow
        # concurrency lock either way. After a red verify, check
        # `make deploy-worker-status` before re-running.
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
          VERIFY_TIMEOUT_SECONDS: "360"
          POLL_INTERVAL_SECONDS: "10"
          DEPLOY_ROLES: ${{ vars.DEPLOY_ROLES || 'app,worker' }}
        run: |
          set -euo pipefail

          # Both worker pools use the same detached rollover mechanics; only
          # verify the pools that were actually part of this deploy's roles.
          ROLES=",${DEPLOY_ROLES:-app,worker},"
          PATTERNS=()
          [[ "$ROLES" == *,worker,* || "$ROLES" == *,all,* ]] && PATTERNS+=('^worker:')
          [[ "$ROLES" == *,worker-canary,* || "$ROLES" == *,all,* ]] && PATTERNS+=('^worker-canary:')
          if [ "${#PATTERNS[@]}" -eq 0 ]; then
            echo "no worker roles in this deploy — nothing to verify"
            exit 0
          fi
          ROLE_FILTER="$(IFS='|'; echo "${PATTERNS[*]}")"
          WORKERS="$(echo "$FLEET_HOSTS" | tr ',' '\n' | grep -E "$ROLE_FILTER" | cut -d: -f2 || true)"
          if [ -z "$WORKERS" ]; then
            echo "no worker hosts in fleet — nothing to verify"
            exit 0
          fi

          short_sha="${DEPLOY_SHA:0:7}"
          status_path="/var/log/143/deploy-worker-${short_sha}.status"
          ssh_opts=(-o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 -i ~/.ssh/deploy-key)

          verify_worker() {
            local host="$1"
            local deadline outcome status
            echo "::group::verify worker $host"
            deadline=$(( $(date +%s) + VERIFY_TIMEOUT_SECONDS ))
            outcome=""
            while :; do
              status="$(ssh "${ssh_opts[@]}" deploy@"$host" "cat '$status_path' 2>/dev/null || true")"
              case "$status" in
                ok)
                  echo "✓ worker $host: rollover succeeded"
                  outcome="ok"
                  break
                  ;;
                fail*)
                  echo "✗ worker $host: rollover FAILED"
                  echo "--- last 100 log lines ---"
                  ssh "${ssh_opts[@]}" deploy@"$host" \
                    "ls -1t /var/log/143/deploy-worker-*-${short_sha}.log 2>/dev/null | head -1 | xargs -r tail -100" || true
                  echo "--- status file contents ---"
                  echo "$status"
                  outcome="fail"
                  echo "::endgroup::"
                  echo "worker $host: $outcome"
                  return 1
                  ;;
                "")
                  if [ "$(date +%s)" -ge "$deadline" ]; then
                    echo "✗ worker $host: rollover did not finish after ${VERIFY_TIMEOUT_SECONDS}s"
                    echo "  follow up with: make deploy-worker-status"
                    outcome="timeout"
                    echo "::endgroup::"
                    echo "worker $host: $outcome"
                    return 1
                  fi
                  sleep "$POLL_INTERVAL_SECONDS"
                  ;;
                *)
                  echo "⚠ worker $host: unexpected status: $status"
                  outcome="unknown"
                  echo "::endgroup::"
                  echo "worker $host: $outcome"
                  return 1
                  ;;
              esac
            done
            echo "::endgroup::"
            echo "worker $host: $outcome"
          }

          pids=()
          for host in $WORKERS; do
            verify_worker "$host" &
            pids+=("$!")
          done

          overall_rc=0
          for pid in "${pids[@]}"; do
            if ! wait "$pid"; then
              overall_rc=1
            fi
          done

          exit $overall_rc
