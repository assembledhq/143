name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: server
            image: ghcr.io/assembledhq/143-server
            context: .
            file: Dockerfile
          - name: sandbox
            image: ghcr.io/assembledhq/143-sandbox
            context: .
            file: sandbox/Dockerfile
          - name: frontend
            image: ghcr.io/assembledhq/143-frontend
            context: .
            file: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sops and age
        run: |
          curl -fsSL https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64 -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops
          curl -fsSL https://dl.filippo.io/age/latest?for=linux/amd64 | tar xz -C /usr/local/bin --strip-components=1

      - name: Write SSH key and age key
        run: |
          mkdir -p ~/.ssh ~/.config/sops/age
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Deploy fleet
        run: |
          chmod +x deploy/scripts/deploy.sh deploy/scripts/deploy-fleet.sh
          ./deploy/scripts/deploy-fleet.sh ~/.ssh/deploy-key "${{ github.sha }}"
