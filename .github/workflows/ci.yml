name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"
  BACKEND_COVERAGE_MIN: "70.0"
  BACKEND_COVERAGE_TARGET: "75.0"
  FRONTEND_COVERAGE_MIN: "80.0"
  FRONTEND_COVERAGE_TARGET: "85.0"

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: onefortythree
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: onefortythree
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://onefortythree:dev@localhost:5432/onefortythree?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet and migrations
        run: |
          go vet ./... &
          go run cmd/migrate/main.go up
          wait

      - name: Run tests with coverage
        run: |
          go test ./internal/... -coverprofile=coverage.out -covermode=atomic -race -timeout=120s
          go tool cover -func=coverage.out

      - name: Check backend coverage floor
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !(${COVERAGE} < ${BACKEND_COVERAGE_MIN}) }"; then
            echo "::error::Backend coverage ${COVERAGE}% is below the minimum ${BACKEND_COVERAGE_MIN}%"
            exit 1
          fi
          if awk "BEGIN { exit !(${COVERAGE} < ${BACKEND_COVERAGE_TARGET}) }"; then
            echo "::warning::Backend coverage ${COVERAGE}% is below target ${BACKEND_COVERAGE_TARGET}%"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.out

  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci

      - name: Run tests with coverage
        timeout-minutes: 5
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary

      - name: Check frontend coverage floor
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log(data.total.lines.pct);
          ")
          echo "Total coverage: ${COVERAGE}%"
          if node -e "process.exit(Number(process.argv[1]) < Number(process.argv[2]) ? 0 : 1)" "$COVERAGE" "${FRONTEND_COVERAGE_MIN}"; then
            echo "::error::Frontend coverage ${COVERAGE}% is below the minimum ${FRONTEND_COVERAGE_MIN}%"
            exit 1
          fi
          if node -e "process.exit(Number(process.argv[1]) < Number(process.argv[2]) ? 0 : 1)" "$COVERAGE" "${FRONTEND_COVERAGE_TARGET}"; then
            echo "::warning::Frontend coverage ${COVERAGE}% is below target ${FRONTEND_COVERAGE_TARGET}%"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  migration-check:
    name: Migration Safety
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: onefortythree
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: onefortythree
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://onefortythree:dev@localhost:5432/onefortythree?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Migrate up
        run: go run cmd/migrate/main.go up

      - name: Migrate down
        run: go run cmd/migrate/main.go down

      - name: Migrate up again (idempotency check)
        run: go run cmd/migrate/main.go up

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build app Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build sandbox Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox
          push: false
          tags: 143-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          gosec ./...

  required-checks:
    name: All Checks Pass
    needs: [backend-lint, backend-test, frontend-lint, frontend-test, migration-check, docker-build, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.backend-test.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-test.result }}" != "success" ]] || \
             [[ "${{ needs.migration-check.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "::error::One or more required checks failed"
            exit 1
          fi
          echo "All checks passed"
