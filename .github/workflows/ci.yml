name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GO_VERSION: "1.26"
  GOFLAGS: "-buildvcs=false"
  NODE_VERSION: "22"
  BACKEND_COVERAGE_MIN: "70.0"
  BACKEND_COVERAGE_TARGET: "75.0"
  FRONTEND_COVERAGE_MIN: "80.0"
  FRONTEND_COVERAGE_TARGET: "85.0"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
            frontend:
              - 'frontend/**'
            migrations:
              - 'migrations/**'
              - 'cmd/migrate/**'
              - 'go.mod'
              - 'go.sum'
            docker:
              - 'Dockerfile'
              - 'Dockerfile.*'
              - 'frontend/Dockerfile*'
              - 'sandbox/Dockerfile*'
              - '.dockerignore'
            ci:
              - '.github/workflows/**'

  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.migrations == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Multi-tenancy guardrails (schema + stores)
        run: make lint-tenancy
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

  backend-test:
    name: Backend Test
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: onefortythree
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: onefortythree
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://onefortythree:dev@localhost:5432/onefortythree?sslmode=disable
      GOTMPDIR: ${{ runner.temp }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download Go modules
        run: go mod download

      - name: Run go vet and migrations
        run: |
          go run cmd/migrate/main.go up
          go vet ./...

      - name: Run tests (PR — no race)
        if: github.event_name == 'pull_request'
        run: go test ./internal/... -coverprofile=coverage.out -covermode=count -timeout=120s

      - name: Run tests with race + coverage (main only)
        if: github.event_name == 'push'
        run: |
          go test ./internal/... -coverprofile=coverage.out -covermode=atomic -race -timeout=180s
          go tool cover -func=coverage.out

      # Integration tests run on every backend-test invocation (PR + push).
      # They reuse the Postgres service this job already brings up — no new
      # infra. Build-tag gating means they don't run during the unit-test
      # step above, so we don't double-charge CI for the same code paths.
      - name: Run integration tests
        run: |
          INTEGRATION_DATABASE_URL=$DATABASE_URL \
          go test -tags=integration -timeout=120s ./internal/integration/...

      - name: Check backend coverage floor (main only)
        if: github.event_name == 'push'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !(${COVERAGE} < ${BACKEND_COVERAGE_MIN}) }"; then
            echo "::error::Backend coverage ${COVERAGE}% is below the minimum ${BACKEND_COVERAGE_MIN}%"
            exit 1
          fi
          if awk "BEGIN { exit !(${COVERAGE} < ${BACKEND_COVERAGE_TARGET}) }"; then
            echo "::warning::Backend coverage ${COVERAGE}% is below target ${BACKEND_COVERAGE_TARGET}%"
          fi

      - name: Upload coverage artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.out

  frontend-lint:
    name: Frontend Lint & Typecheck
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  frontend-test:
    name: Frontend Test
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v6
        if: github.event_name == 'pull_request'
        with:
          python-version: '3.x'

      - name: Materialize PR base ref (PR only)
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git rev-parse --verify "${PR_BASE_SHA}^{commit}"
          git branch -f pr-base "${PR_BASE_SHA}"

      - name: Install diff-cover (PR only)
        if: github.event_name == 'pull_request'
        run: pip install 'diff_cover==10.2.0'

      - run: npm ci
      - run: npm run lint

      - name: Run affected tests (PR)
        if: github.event_name == 'pull_request'
        timeout-minutes: 10
        run: npx vitest run --changed=pr-base --passWithNoTests --coverage --coverage.reporter=lcov --coverage.reporter=json-summary

      - name: Patch coverage gate (PR only)
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -f coverage/lcov.info ]; then
            # vitest --changed found no affected tests, so no coverage was emitted.
            # Fail if the diff includes frontend source files — uncovered changes shouldn't merge silently.
            CHANGED_SOURCES=$(cd .. && git diff --name-only pr-base...HEAD \
              | grep -E '^frontend/src/.*\.(ts|tsx)$' \
              | grep -v '\.test\.' || true)
            if [ -n "$CHANGED_SOURCES" ]; then
              echo "::error::Frontend source files changed but no tests cover them:"
              echo "$CHANGED_SOURCES"
              exit 1
            fi
            echo "::notice::No frontend source files in diff; skipping patch-coverage gate."
            exit 0
          fi
          diff-cover coverage/lcov.info --compare-branch=pr-base --fail-under=80

      - name: Run full tests with coverage (main only)
        if: github.event_name == 'push'
        timeout-minutes: 10
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=lcov

      - name: Check frontend coverage floor (main only)
        if: github.event_name == 'push'
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log(data.total.lines.pct);
          ")
          echo "Total coverage: ${COVERAGE}%"
          if node -e "process.exit(Number(process.argv[1]) < Number(process.argv[2]) ? 0 : 1)" "$COVERAGE" "${FRONTEND_COVERAGE_MIN}"; then
            echo "::error::Frontend coverage ${COVERAGE}% is below the minimum ${FRONTEND_COVERAGE_MIN}%"
            exit 1
          fi
          if node -e "process.exit(Number(process.argv[1]) < Number(process.argv[2]) ? 0 : 1)" "$COVERAGE" "${FRONTEND_COVERAGE_TARGET}"; then
            echo "::warning::Frontend coverage ${COVERAGE}% is below target ${FRONTEND_COVERAGE_TARGET}%"
          fi

      - name: Upload coverage artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  migration-check:
    name: Migration Safety
    needs: changes
    if: needs.changes.outputs.migrations == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: onefortythree
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: onefortythree
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://onefortythree:dev@localhost:5432/onefortythree?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Migrate up
        run: go run cmd/migrate/main.go up

      - name: Migrate down
        run: go run cmd/migrate/main.go down

      - name: Migrate up again (idempotency check)
        run: go run cmd/migrate/main.go up

  docker-build:
    name: Docker Build
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build app Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build sandbox Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandbox/Dockerfile
          push: false
          tags: 143-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          gosec ./...

  required-checks:
    name: All Checks Pass
    needs: [changes, backend-lint, backend-test, frontend-lint, frontend-test, migration-check, docker-build, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "backend-lint: ${{ needs.backend-lint.result }}"
          echo "backend-test: ${{ needs.backend-test.result }}"
          echo "frontend-lint: ${{ needs.frontend-lint.result }}"
          echo "frontend-test: ${{ needs.frontend-test.result }}"
          echo "migration-check: ${{ needs.migration-check.result }}"
          echo "docker-build: ${{ needs.docker-build.result }}"
          echo "security: ${{ needs.security.result }}"

          for result in \
            "${{ needs.backend-lint.result }}" \
            "${{ needs.backend-test.result }}" \
            "${{ needs.frontend-lint.result }}" \
            "${{ needs.frontend-test.result }}" \
            "${{ needs.migration-check.result }}" \
            "${{ needs.docker-build.result }}" \
            "${{ needs.security.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::One or more required checks failed"
              exit 1
            fi
          done
          echo "All checks passed"
