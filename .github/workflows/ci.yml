name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Twice daily: the scheduled run is the only place the full frontend
    # suite executes with coverage, so cap the exposure window for a
    # cross-cutting break that affected-test runs missed to ~12 hours.
    - cron: "17 10,22 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: "1.26"
  GOFLAGS: "-buildvcs=false"
  NODE_VERSION: "24"
  BACKEND_COVERAGE_MIN: "70.0"
  BACKEND_COVERAGE_TARGET: "75.0"
  FRONTEND_COVERAGE_MIN: "80.0"
  FRONTEND_COVERAGE_TARGET: "85.0"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      docker: ${{ steps.filter.outputs.docker }}
      deploy: ${{ steps.filter.outputs.deploy }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
            frontend:
              - 'frontend/**'
            migrations:
              - 'migrations/**'
              - 'cmd/migrate/**'
              - 'go.mod'
              - 'go.sum'
            docker:
              - 'Dockerfile'
              - 'Dockerfile.*'
              - 'frontend/Dockerfile*'
              - 'sandbox/Dockerfile*'
              - '.dockerignore'
            deploy:
              - 'deploy/scripts/**'
            ci:
              - '.github/workflows/**'

  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.migrations == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Multi-tenancy guardrails (schema + stores)
        run: make lint-tenancy
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  backend-test:
    name: Backend Test
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: onefortythree
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: onefortythree
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://onefortythree:dev@localhost:5432/onefortythree?sslmode=disable
      # Drives DB-backed migration behavior tests (e.g. the coding-credential
      # versioning test in internal/db). They self-skip when unset, so this
      # must point at the job's Postgres service or they never run anywhere.
      TEST_DATABASE_URL: postgres://onefortythree:dev@localhost:5432/onefortythree?sslmode=disable
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download Go modules
        run: go mod download

      - name: Wait for Postgres
        run: go run ./cmd/wait-postgres

      - name: Run go vet and migrations
        run: |
          go run ./cmd/migrate up
          go vet ./...

      - name: Run tests (PR — no race)
        if: github.event_name == 'pull_request'
        run: go test ./internal/... -coverprofile=coverage.out -covermode=count -timeout=120s

      - name: Run tests with race + coverage (main only)
        if: github.event_name == 'push'
        run: |
          go test ./internal/... -coverprofile=coverage.out -covermode=atomic -race -timeout=180s
          go tool cover -func=coverage.out

      # Integration tests run on every backend-test invocation (PR + push).
      # They reuse the Postgres service this job already brings up — no new
      # infra. Build-tag gating means they don't run during the unit-test
      # step above, so we don't double-charge CI for the same code paths.
      - name: Run integration tests
        run: |
          INTEGRATION_DATABASE_URL=$DATABASE_URL \
          go test -tags=integration -timeout=120s ./internal/integration/...

      - name: Check backend coverage floor (main only)
        if: github.event_name == 'push'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !(${COVERAGE} < ${BACKEND_COVERAGE_MIN}) }"; then
            echo "::error::Backend coverage ${COVERAGE}% is below the minimum ${BACKEND_COVERAGE_MIN}%"
            exit 1
          fi
          if awk "BEGIN { exit !(${COVERAGE} < ${BACKEND_COVERAGE_TARGET}) }"; then
            echo "::warning::Backend coverage ${COVERAGE}% is below target ${BACKEND_COVERAGE_TARGET}%"
          fi

      - name: Upload coverage artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: coverage.out

  frontend-lint:
    name: Frontend Lint & Typecheck
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  frontend-test:
    name: Frontend Test
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Materialize PR base ref (PR only)
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git rev-parse --verify "${PR_BASE_SHA}^{commit}"
          git branch -f pr-base "${PR_BASE_SHA}"

      # Main pushes run affected tests against the previous main SHA instead
      # of the full suite: the merged PR already ran the same affected set,
      # and the full suite (~10 min on a 2-core runner) was burning that time
      # on every merge. The twice-daily scheduled run still executes the full
      # suite with coverage as the backstop. github.event.before is all
      # zeros on branch creation and unreachable after a force push, so fall
      # back to the full suite when it can't be resolved.
      - name: Materialize push base ref (main push only)
        if: github.event_name == 'push'
        working-directory: ${{ github.workspace }}
        env:
          PUSH_BASE_SHA: ${{ github.event.before }}
        run: |
          if [ "$PUSH_BASE_SHA" != "0000000000000000000000000000000000000000" ] \
            && git rev-parse --verify --quiet "${PUSH_BASE_SHA}^{commit}"; then
            git branch -f push-base "$PUSH_BASE_SHA"
            echo "FRONTEND_FULL_RUN=false" >> "$GITHUB_ENV"
          else
            echo "push base $PUSH_BASE_SHA unavailable; running full suite"
            echo "FRONTEND_FULL_RUN=true" >> "$GITHUB_ENV"
          fi

      - run: npm ci

      - name: Run affected tests (PR)
        if: github.event_name == 'pull_request'
        timeout-minutes: 10
        run: npx vitest run --changed=pr-base --passWithNoTests

      - name: Run affected tests (main)
        if: github.event_name == 'push'
        timeout-minutes: 10
        run: |
          if [ "$FRONTEND_FULL_RUN" = "true" ]; then
            npx vitest run --reporter=dot
          else
            npx vitest run --changed=push-base --passWithNoTests --reporter=dot
          fi

      - name: Run full tests with coverage (scheduled/manual)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 20
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=lcov

      - name: Check frontend coverage floor (scheduled/manual)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log(data.total.lines.pct);
          ")
          echo "Total coverage: ${COVERAGE}%"
          if node -e "process.exit(Number(process.argv[1]) < Number(process.argv[2]) ? 0 : 1)" "$COVERAGE" "${FRONTEND_COVERAGE_MIN}"; then
            echo "::error::Frontend coverage ${COVERAGE}% is below the minimum ${FRONTEND_COVERAGE_MIN}%"
            exit 1
          fi
          if node -e "process.exit(Number(process.argv[1]) < Number(process.argv[2]) ? 0 : 1)" "$COVERAGE" "${FRONTEND_COVERAGE_TARGET}"; then
            echo "::warning::Frontend coverage ${COVERAGE}% is below target ${FRONTEND_COVERAGE_TARGET}%"
          fi

      - name: Upload coverage artifact
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage

  migration-check:
    name: Migration Safety
    needs: changes
    if: needs.changes.outputs.migrations == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: onefortythree
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: onefortythree
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://onefortythree:dev@localhost:5432/onefortythree?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Wait for Postgres
        run: go run ./cmd/wait-postgres

      - name: Validate migration filenames
        run: go test ./cmd/migrate -run TestMigrationVersionsAreUnique -count=1

      - name: Migrate up
        run: go run ./cmd/migrate up

      - name: Migrate down
        run: go run ./cmd/migrate down

      - name: Migrate up again (idempotency check)
        run: go run ./cmd/migrate up

  docker-build:
    name: Docker Build
    needs: changes
    if: github.event_name == 'pull_request' && (needs.changes.outputs.docker == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: app
            context: .
            file: Dockerfile
            tags: 143-app:latest
          - name: sandbox
            context: .
            file: sandbox/Dockerfile
            tags: 143-sandbox:latest
          - name: frontend
            context: .
            file: Dockerfile.frontend
            tags: 143-frontend:latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.name }} Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: ${{ matrix.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  security:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          gosec ./...

  deploy-scripts-test:
    name: Deploy Scripts Test
    needs: changes
    if: needs.changes.outputs.deploy == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run deploy shell tests
        run: |
          set -euo pipefail
          for t in deploy/scripts/*_test.sh; do
            echo "--- $t"
            bash "$t"
          done

  required-checks:
    name: All Checks Pass
    needs: [changes, backend-lint, backend-test, frontend-lint, frontend-test, migration-check, docker-build, security, deploy-scripts-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "backend-lint: ${{ needs.backend-lint.result }}"
          echo "backend-test: ${{ needs.backend-test.result }}"
          echo "frontend-lint: ${{ needs.frontend-lint.result }}"
          echo "frontend-test: ${{ needs.frontend-test.result }}"
          echo "migration-check: ${{ needs.migration-check.result }}"
          echo "docker-build: ${{ needs.docker-build.result }}"
          echo "security: ${{ needs.security.result }}"
          echo "deploy-scripts-test: ${{ needs.deploy-scripts-test.result }}"

          for result in \
            "${{ needs.backend-lint.result }}" \
            "${{ needs.backend-test.result }}" \
            "${{ needs.frontend-lint.result }}" \
            "${{ needs.frontend-test.result }}" \
            "${{ needs.migration-check.result }}" \
            "${{ needs.docker-build.result }}" \
            "${{ needs.security.result }}" \
            "${{ needs.deploy-scripts-test.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::One or more required checks failed"
              exit 1
            fi
          done
          echo "All checks passed"
