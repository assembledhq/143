root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -ldflags \"-X github.com/assembledhq/143/internal/version.BuildSHA=$(git rev-parse HEAD 2>/dev/null || echo dev)\" -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  delay = 1000
  include_ext = ["go"]
  exclude_dir = ["tmp", "frontend", "node_modules"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
