# App node (API + Frontend + Caddy reverse proxy).
# Connects to a remote Postgres instance via DB_HOST.
# No Docker socket mount — sandboxes run on worker nodes only.
# See docs/design/36-docker-agents-vps-architecture.md

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    restart: unless-stopped

  api:
    image: ghcr.io/assembledhq/143-server:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgres://onefortythree:${DB_PASSWORD}@${DB_HOST}:5432/onefortythree?sslmode=disable
      PORT: "8080"
      MODE: api
      NODE_ID: ${HOSTNAME:-app-1}
      BASE_URL: ${BASE_URL:-https://143.dev}
      FRONTEND_URL: ${FRONTEND_URL:-https://143.dev}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"

  frontend:
    image: ghcr.io/assembledhq/143-frontend:${IMAGE_TAG:-latest}
    environment:
      API_PROXY_TARGET: http://api:8080
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

volumes:
  caddy_data:
