# App node (API + Frontend + Caddy reverse proxy).
# Connects to a remote Postgres instance via DB_HOST.
# No Docker socket mount — sandboxes run on worker nodes only.
# See docs/design/36-docker-agents-vps-architecture.md

include:
  - docker-compose.vector.yml
  - docker-compose.dns-probe.yml

services:
  caddy:
    # Build a custom Caddy image with the Cloudflare DNS provider module so
    # wildcard preview certificates can use the ACME DNS challenge.
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-143.dev}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?set in .env.production.enc for wildcard preview certificates}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    restart: unless-stopped

  api:
    image: ghcr.io/assembledhq/143-server:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgres://onefortythree:${DB_PASSWORD}@${DB_HOST}:5432/onefortythree?sslmode=disable
      DATABASE_MAX_CONNS: ${API_DATABASE_MAX_CONNS:-20}
      DATABASE_MAX_CONN_IDLE_TIME: ${API_DATABASE_MAX_CONN_IDLE_TIME:-5m}
      PORT: "8080"
      PREVIEW_GATEWAY_PORT: "9090"
      ENV: production
      MODE: api
      BASE_URL: ${BASE_URL:-https://143.dev}
      FRONTEND_URL: ${FRONTEND_URL:-https://143.dev}
      PREVIEW_ORIGIN_TEMPLATE: ${PREVIEW_ORIGIN_TEMPLATE:-https://{id}.preview.143.dev}
      NODE_ID: ${NODE_ID:-}
    env_file:
      - .env
    volumes:
      # Mounted at /app (the workdir) — docker-entrypoint.sh resolves the
      # bundle relative to the workdir; the image itself carries no secrets.
      - .env.production.enc:/app/.env.production.enc:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    # Give in-flight requests and SSE streams up to 2 minutes to drain before
    # Docker sends SIGKILL. Must be >= the server's Shutdown deadline in
    # cmd/server/main.go so the process exits cleanly on its own.
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"

  frontend:
    image: ghcr.io/assembledhq/143-frontend:${IMAGE_TAG:-latest}
    environment:
      API_PROXY_TARGET: http://api:8080
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
    depends_on:
      - api
    healthcheck:
      # node -e avoids needing wget/curl in the minimal node:22-alpine image.
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://127.0.0.1:3000/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

volumes:
  caddy_data:
